<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="robots" content="noindex, nofollow">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>製造数内訳</title>
<style>
  :root {
    --bg: #f5f5f7;
    --surface: #ffffff;
    --surface-2: #f5f5f7;
    --border: rgba(0,0,0,0.08);
    --border-strong: rgba(0,0,0,0.14);
    --ink: #1d1d1f;
    --ink-2: #6e6e73;
    --ink-3: #aeaeb2;
    --blue: #0071e3;
    --blue-light: #e8f1fb;
    --red: #ff3b30;
    --green: #34c759;
    --orange: #ff9500;
    --purple: #af52de;
    --teal: #5ac8fa;
    --row-alt: rgba(0,0,0,0.018);
    --radius: 12px;
    --radius-sm: 8px;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    font-family: -apple-system, BlinkMacSystemFont, 'SF Pro Text', 'Helvetica Neue', sans-serif;
    background: var(--bg);
    color: var(--ink);
    min-height: 100vh;
    padding: 2.5rem 1.5rem 5rem;
    -webkit-font-smoothing: antialiased;
  }

  /* ── Header ── */
  header {
    text-align: center;
    margin-bottom: 2.5rem;
  }
  .header-eyebrow {
    font-size: 0.72rem;
    font-weight: 600;
    letter-spacing: 0.12em;
    text-transform: uppercase;
    color: var(--blue);
    margin-bottom: 0.4rem;
  }
  header h1 {
    font-size: 2rem;
    font-weight: 700;
    letter-spacing: -0.02em;
    color: var(--ink);
    line-height: 1.1;
  }
  header p {
    font-size: 0.88rem;
    color: var(--ink-2);
    margin-top: 0.5rem;
    font-weight: 400;
  }

  /* ── Cards ── */
  .card {
    background: var(--surface);
    border-radius: var(--radius);
    padding: 1.6rem;
    margin: 0 auto 1rem;
    max-width: 860px;
    box-shadow: 0 1px 0 var(--border), 0 4px 16px rgba(0,0,0,0.04);
  }
  .card-label {
    font-size: 0.7rem;
    font-weight: 600;
    letter-spacing: 0.1em;
    text-transform: uppercase;
    color: var(--ink-3);
    margin-bottom: 1rem;
  }

  /* ── Upload inline ── */
  .upload-inline {
    display: flex; align-items: center; gap: 0.7rem;
    margin-bottom: 1.4rem;
  }
  .btn-upload {
    font-family: inherit; font-size: 0.82rem; font-weight: 500;
    padding: 0.42rem 1rem;
    background: var(--surface-2); color: var(--blue);
    border: 1.5px solid var(--border-strong);
    border-radius: 980px; cursor: pointer;
    transition: all 0.15s; white-space: nowrap;
    flex-shrink: 0;
  }
  .btn-upload:hover { border-color: var(--blue); background: var(--blue-light); }
  .file-status {
    font-size: 0.7rem; font-weight: 600; letter-spacing: 0.05em;
    color: var(--ink-2);
    word-break: break-all;
  }

  /* ── Form fields ── */
  .field-group { margin-bottom: 1.2rem; }
  .field-label {
    font-size: 0.75rem; font-weight: 500;
    color: var(--ink-2); margin-bottom: 0.4rem;
    display: block;
  }
  input[type="date"] {
    font-family: inherit; font-size: 0.92rem;
    padding: 0.55rem 0.8rem;
    border: 1.5px solid var(--border-strong);
    border-radius: var(--radius-sm);
    background: var(--surface-2);
    color: var(--ink);
    appearance: none;
    transition: border-color 0.15s;
  }
  input[type="date"]:focus { outline: none; border-color: var(--blue); }

  /* ── Store inputs ── */
  .store-inputs {
    display: flex; gap: 0.6rem; flex-wrap: wrap;
  }
  .store-input-cell {
    flex: 1; min-width: 110px;
    background: var(--surface-2);
    border: 1.5px solid var(--border);
    border-radius: var(--radius-sm);
    padding: 0.75rem 0.85rem;
    transition: border-color 0.15s;
  }
  .store-input-cell:focus-within { border-color: var(--blue); }
  .store-input-cell.manual {
    border-style: dashed;
    opacity: 0.75;
  }
  .store-input-cell .s-name {
    font-size: 0.78rem; font-weight: 600;
    color: var(--ink-2); margin-bottom: 0.35rem;
  }
  .store-input-cell input[type="number"] {
    font-family: 'SF Mono', 'Menlo', monospace;
    font-size: 1.1rem; font-weight: 500;
    color: var(--ink);
    border: none; background: transparent;
    width: 100%; outline: none;
    padding: 0;
  }
  .store-input-cell input::placeholder { color: var(--ink-3); font-weight: 400; }

  /* ── Button ── */
  .btn-primary {
    font-family: inherit; font-size: 0.9rem; font-weight: 600;
    padding: 0.62rem 1.8rem;
    background: var(--blue); color: white;
    border: none; border-radius: 980px;
    cursor: pointer;
    transition: opacity 0.15s, transform 0.1s;
    letter-spacing: -0.01em;
  }
  .btn-primary:hover { opacity: 0.88; }
  .btn-primary:active { transform: scale(0.97); }
  .btn-primary:disabled { background: var(--ink-3); cursor: not-allowed; transform: none; opacity: 1; }

  /* ── Warn ── */
  .warn-pill {
    display: inline-flex; align-items: center; gap: 0.4rem;
    background: #fff3cd; color: #7a5f00;
    font-size: 0.78rem; font-weight: 500;
    padding: 0.4rem 0.8rem; border-radius: 980px;
    margin-bottom: 1rem;
  }

  /* ── Results ── */
  #results { display: none; max-width: 1060px; margin: 0 auto; }

  .result-topbar {
    display: flex; justify-content: space-between; align-items: baseline;
    margin-bottom: 1rem;
    max-width: 1060px; margin-left: auto; margin-right: auto;
  }
  .result-title {
    font-size: 1.3rem; font-weight: 700; letter-spacing: -0.02em;
    color: var(--ink);
  }
  .result-meta {
    font-size: 0.78rem; color: var(--ink-2); margin-top: 0.1rem;
  }
  .print-btn {
    font-family: inherit; font-size: 0.78rem; font-weight: 500;
    padding: 0.38rem 0.9rem;
    background: transparent; color: var(--ink-2);
    border: 1.5px solid var(--border-strong);
    border-radius: 980px; cursor: pointer;
    transition: all 0.15s;
  }
  .print-btn:hover { color: var(--ink); border-color: var(--ink); }

  /* ── Main table card ── */
  .table-card {
    background: var(--surface);
    border-radius: var(--radius);
    overflow: hidden;
    box-shadow: 0 1px 0 var(--border), 0 4px 20px rgba(0,0,0,0.05);
    overflow-x: auto;
    margin-bottom: 0.6rem;
  }

  table.main-table {
    border-collapse: collapse;
    width: 100%;
    min-width: 620px;
  }

  /* thead */
  table.main-table thead th {
    background: var(--surface);
    border-bottom: 1px solid var(--border-strong);
    padding: 0.7rem 1rem;
    font-size: 0.78rem;
    font-weight: 600;
    letter-spacing: -0.01em;
    text-align: center;
    white-space: nowrap;
  }
  thead th.th-product {
    text-align: left;
    color: var(--ink-2);
    min-width: 120px;
    padding-left: 1.2rem;
  }
  thead th.th-store { color: var(--blue); min-width: 72px; }
  thead th.th-total { color: var(--ink); min-width: 60px; }
  thead th.th-date {
    font-size: 0.92rem; font-weight: 700;
    text-align: left; color: var(--ink);
    padding-left: 1.2rem; letter-spacing: -0.02em;
  }

  /* Section header rows */
  tr.section-head td {
    background: var(--surface-2);
    font-size: 0.68rem;
    font-weight: 700;
    letter-spacing: 0.1em;
    text-transform: uppercase;
    color: var(--ink-3);
    padding: 0.35rem 1.2rem;
    border-top: 1px solid var(--border);
    border-bottom: 1px solid var(--border);
  }

  /* Body rows */
  table.main-table tbody tr { transition: background 0.1s; }
  table.main-table tbody tr:hover { background: var(--row-alt); }
  table.main-table tbody td {
    padding: 0.6rem 1rem;
    border-bottom: 1px solid var(--border);
    font-size: 0.9rem;
    vertical-align: middle;
  }
  table.main-table tbody tr:last-child td { border-bottom: none; }

  td.td-product {
    font-weight: 500;
    color: var(--ink);
    white-space: nowrap;
    padding-left: 1.2rem;
    min-width: 0;
  }
  td.td-product.daily { color: var(--blue); }
  td.td-product.group-parent { font-weight: 500; }

  td.td-num {
    text-align: center;
    font-family: 'SF Mono', 'Menlo', monospace;
    font-size: 0.92rem;
    font-weight: 500;
    color: var(--ink);
  }
  td.td-num.na { color: var(--ink-3); font-weight: 400; }
  td.td-num.zero { color: var(--ink-3); }

  td.td-total {
    text-align: center;
    font-family: 'SF Mono', 'Menlo', monospace;
    font-size: 0.92rem;
    font-weight: 700;
    color: var(--ink);
    border-left: 1px solid var(--border);
  }
  td.td-total.na { color: var(--ink-3); font-weight: 400; }

  /* Subtotal / grand total rows */
  tr.subtotal-row td {
    background: var(--surface-2) !important;
    font-weight: 600;
    font-size: 0.85rem;
    border-top: 1px solid var(--border-strong);
    color: var(--ink-2);
  }
  tr.subtotal-row td.td-product { color: var(--ink-2); }
  tr.subtotal-row td.td-num, tr.subtotal-row td.td-total {
    font-family: 'SF Mono', 'Menlo', monospace;
    color: var(--ink);
  }

  tr.grand-row td {
    background: var(--ink) !important;
    font-weight: 700;
    font-size: 0.92rem;
    border: none;
    color: white;
  }
  tr.grand-row td.td-product { color: rgba(255,255,255,0.7); padding-left: 1.2rem; }
  tr.grand-row td.td-num {
    font-family: 'SF Mono', 'Menlo', monospace;
    color: white;
  }
  tr.grand-row td.td-total {
    font-family: 'SF Mono', 'Menlo', monospace;
    color: white; border-left: 1px solid rgba(255,255,255,0.15);
    font-size: 1rem;
  }

  /* Child rows (もちっと内訳) */
  tr.child-row td { background: #fafafa; }
  tr.child-row td.td-product {
    font-size: 0.82rem; font-weight: 400;
    color: var(--ink-2); padding-left: 2.4rem;
  }
  tr.child-row td.td-num { font-size: 0.82rem; color: var(--ink-2); }
  tr.child-row td.td-total { font-size: 0.82rem; color: var(--ink-2); font-weight: 500; }

  /* Toggle button */
  .toggle-btn {
    display: inline-flex; align-items: center; justify-content: center;
    width: 18px; height: 18px;
    background: var(--blue); color: white;
    border-radius: 50%;
    font-size: 0.7rem; font-weight: 700;
    cursor: pointer; margin-right: 0.45rem;
    user-select: none;
    transition: background 0.15s, transform 0.15s;
    vertical-align: middle; line-height: 1;
    flex-shrink: 0;
  }
  .toggle-btn:hover { background: #0062c4; }
  .toggle-btn.open { background: var(--ink-3); transform: rotate(45deg); }

  .calc-note {
    font-size: 0.72rem; color: var(--ink-3);
    text-align: center; margin-top: 0.4rem;
  }

  /* ── Date selector tabs ── */
  .date-tabs {
    display: flex; gap: 0.5rem; flex-wrap: wrap;
    margin-bottom: 1.2rem;
    align-items: center;
  }
  .date-tab {
    font-family: inherit; font-size: 0.82rem; font-weight: 500;
    padding: 0.42rem 1rem;
    background: var(--surface-2); color: var(--ink-2);
    border: 1.5px solid var(--border-strong);
    border-radius: 980px; cursor: pointer;
    transition: all 0.15s; white-space: nowrap;
  }
  .date-tab:hover { border-color: var(--blue); color: var(--blue); background: var(--blue-light); }
  .date-tab.active {
    background: var(--blue); color: white;
    border-color: var(--blue);
  }
  .date-custom-wrap {
    display: flex; align-items: center; gap: 0.4rem;
    flex-shrink: 0;
  }
  .date-custom-wrap input[type="date"] {
    font-size: 0.85rem;
    padding: 0.38rem 0.7rem;
  }
  .date-tab-label {
    font-size: 0.7rem; font-weight: 600;
    letter-spacing: 0.1em; text-transform: uppercase;
    color: var(--ink-3); margin-bottom: 0.5rem;
    display: block;
  }

  input[type="url"] {
    transition: border-color 0.15s;
  }
  input[type="url"]:focus { outline: none; border-color: var(--blue); }
  details summary::-webkit-details-marker { color: var(--ink-3); }

  @media print {
    .card, .result-topbar .print-btn { display: none !important; }
    #results { display: block !important; }
    body { background: white; padding: 0; }
    .table-card { box-shadow: none; }
  }
</style>
</head>
<body>

<header>
  <div class="header-eyebrow">Donut Studio</div>
  <h1>製造数内訳</h1>
  <p id="headerSub">データを読み込んでいます...</p>
</header>

<!-- データ状態バー -->
<div class="card" id="dataStatusCard" style="max-width:860px;">
  <div style="display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:0.6rem;">
    <div style="display:flex;flex-direction:column;gap:0.25rem;">
      <span class="file-status" id="posStatus">取引データ: 未読み込み</span>
      <span class="file-status" id="planStatus">製造計画: 未読み込み</span>
    </div>
    <div style="display:flex;gap:0.5rem;align-items:center;">
      <button class="btn-upload" id="refreshBtn" style="display:none;">↻ 更新</button>
      <details style="font-size:0.75rem;">
        <summary style="cursor:pointer;color:var(--ink-3);user-select:none;">データソースを設定</summary>
        <div style="margin-top:0.8rem;display:flex;flex-direction:column;gap:0.8rem;">
          <div>
            <label style="font-size:0.75rem;font-weight:500;color:var(--ink-2);">GAS Web App URL</label>
            <p style="font-size:0.72rem;color:var(--ink-3);margin:0.2rem 0 0.4rem;">GASをデプロイしたときに発行されるURL</p>
            <div style="display:flex;gap:0.5rem;flex-wrap:wrap;margin-top:0.3rem;">
              <input type="url" id="gasUrl" placeholder="https://script.google.com/macros/s/..." style="flex:1;min-width:220px;font-family:inherit;font-size:0.82rem;padding:0.45rem 0.75rem;border:1.5px solid var(--border-strong);border-radius:var(--radius-sm);background:var(--surface-2);color:var(--ink);">
            </div>
          </div>
          <button class="btn-upload" id="loadSheetsBtn" style="align-self:flex-start;">読み込む</button>
          <div style="border-top:1px solid var(--border);padding-top:0.6rem;">
            <label style="font-size:0.75rem;font-weight:500;color:var(--ink-2);">またはCSVファイルから（取引履歴のみ）</label><br>
            <div style="margin-top:0.4rem;display:flex;align-items:center;gap:0.6rem;">
              <button class="btn-upload" id="uploadBtn">📂 CSVを選択</button>
              <input type="file" id="csvFile" accept=".csv" style="position:absolute;opacity:0;pointer-events:none;">
            </div>
          </div>
        </div>
      </details>
    </div>
  </div>
</div>

<!-- 製造日選択カード -->
<div class="card" id="inputCard" style="display:none;">
  <div class="card-label">製造数内訳を計算する</div>
  <div style="display:flex;align-items:flex-end;gap:1rem;flex-wrap:wrap;">
    <div>
      <span class="date-tab-label">製造日</span>
      <input type="date" id="targetDateInput">
    </div>
    <button class="btn-primary" id="calcBtn">内訳を計算する</button>
  </div>
  <div id="totalPreview" style="margin-top:1rem;display:none;">
    <span class="date-tab-label">製造計画から取得した総製造数</span>
    <div class="store-inputs" id="totalDisplay" style="margin-top:0.5rem;"></div>
  </div>
</div>

<!-- Results -->
<div id="results">
  <div class="result-topbar">
    <div>
      <div class="result-title">製造内訳</div>
      <div class="result-meta" id="dateLine"></div>
    </div>
    <button class="print-btn" onclick="window.print()">印刷</button>
  </div>

  <div id="warnArea"></div>

  <div class="table-card">
    <table class="main-table" id="wbTable"></table>
  </div>

  <p class="calc-note" id="calcNote"></p>
</div>

<script>
// ── 定数 ──────────────────────────────────────────
const STORE_NAMES = {1:'平尾店', 3:'ソラリア店', 5:'香椎店', 8:'赤坂店'};
const AUTO_STORES = [1,3,5,8];
const EXCLUDE_DEPTS = ['袋・BOX','ドリンク','Uber Eats','Rocket Now'];
const DOW_JP = ['日','月','火','水','木','金','土'];

const FIXED_BY_STORE = {
  1: ['つばめ','もちっとシュガー','チョコオールドファッション','プレーン','シナモンロール','シュガードーナツ','きび焚糖','和三盆','黒ごまきなこ','オールドファッション'],
  3: ['つばめ','もちっとシュガー','チョコオールドファッション','プレーン','シナモンロール','シュガードーナツ','きび焚糖','和三盆','黒ごまきなこ','オールドファッション'],
  5: ['つばめ','もちっとシュガー','チョコオールドファッション','プレーン','シナモンロール','シュガードーナツ','きび焚糖','和三盆','黒ごまきなこ','オールドファッション'],
  8: ['つばめ','もちっとシュガー','チョコオールドファッション','プレーン','シナモンロール','シュガードーナツ','きび焚糖','和三盆','黒ごまきなこ','オールドファッション','豆乳ホイップ'],
};
const ALL_FIXED = [...new Set(Object.values(FIXED_BY_STORE).flat())];
const MOCHITTO_PLAIN_GROUP = ['きび焚糖','和三盆','黒ごまきなこ'];
const MOCHITTO_PLAIN_LABEL = 'もちっとプレーン';

const LS_GAS_URL  = 'donut_gas_url';
const DEFAULT_GAS_URL = 'https://script.google.com/macros/s/AKfycbxAWJt57n_vPczAYCFMyAbAu7Q2_1r3OLaA7aXtvXaQ0X117VGcYrB7dHz69YD3spU/exec';
const DAYS_BACK   = 28; // 直近4週

let posData  = [];   // 取引履歴
let planData = {};   // {storeId: {day: qty}}

// ── 初期化 ────────────────────────────────────────
document.addEventListener('DOMContentLoaded', async () => {
  const tomorrow = new Date(); tomorrow.setDate(tomorrow.getDate()+1);
  document.getElementById('targetDateInput').value = tomorrow.toISOString().split('T')[0];
  document.getElementById('targetDateInput').addEventListener('change', onDateChange);

  document.getElementById('loadSheetsBtn').addEventListener('click', loadBothSheets);
  document.getElementById('refreshBtn').addEventListener('click', loadBothSheets);
  document.getElementById('uploadBtn').addEventListener('click', () => document.getElementById('csvFile').click());
  document.getElementById('csvFile').addEventListener('change', e => loadPosFile(e.target.files[0]));
  document.getElementById('calcBtn').addEventListener('click', calculate);

  // 保存済みURLがあれば自動読み込み
  const savedGas = localStorage.getItem(LS_GAS_URL) || DEFAULT_GAS_URL;
  document.getElementById('gasUrl').value = savedGas;
  await loadBothSheets();
});

// ── ステータス ─────────────────────────────────────
function setStatus(msg, target, ok) {
  const id = target === 'plan' ? 'planStatus' : 'posStatus';
  const prefix = target === 'plan' ? '製造計画: ' : '取引データ: ';
  const el = document.getElementById(id);
  el.textContent = ok === true ? prefix + '✓ ' + msg
                 : ok === false ? prefix + '⚠ ' + msg
                 : prefix + msg;
}

// ── GAS API から両データ取得 ──────────────────────
async function fetchGas(gasUrl, params) {
  const url = gasUrl + '?' + new URLSearchParams(params).toString();
  const res = await fetch(url, {
    redirect: 'follow',
    mode: 'cors',
  });
  if (!res.ok) throw new Error(`取得失敗 (HTTP ${res.status})`);
  const text = await res.text();
  let data;
  try { data = JSON.parse(text); }
  catch { throw new Error('レスポンスの解析に失敗しました: ' + text.slice(0, 100)); }
  if (data.error) throw new Error(data.error);
  return data;
}

async function loadBothSheets() {
  const gasUrl = document.getElementById('gasUrl').value.trim();
  if (!gasUrl) { setStatus('GAS URLを入力してください', 'pos', false); return; }

  const btn = document.getElementById('loadSheetsBtn');
  btn.disabled = true; btn.textContent = '読み込み中…';

  let posOk = false, planOk = false;

  // 取引履歴
  setStatus('スマレジからデータ取得中…', 'pos', null);
  try {
    const data = await fetchGas(gasUrl, { type: 'pos' });
    posData = data.rows.map(r => ({
      date: r.date, storeId: r.storeId, product: r.product, dept: r.dept, qty: r.qty
    }));
    localStorage.setItem(LS_GAS_URL, gasUrl);
    const now = new Date().toLocaleString('ja-JP');
    const cachedAt = data._cachedAt ? data._cachedAt : now;
    setStatus(`読み込み完了 · ${cachedAt}`, 'pos', true);
    posOk = true;
  } catch(e) { setStatus(e.message, 'pos', false); }

  // 製造計画
  setStatus('製造計画を取得中…', 'plan', null);
  try {
    const month = new Date().getMonth() + 1;
    const data = await fetchGas(gasUrl, { type: 'plan', month });
    planData = {};
    for (const [sid, days] of Object.entries(data.stores)) {
      planData[parseInt(sid)] = {};
      for (const [day, qty] of Object.entries(days)) {
        planData[parseInt(sid)][parseInt(day)] = qty;
      }
    }
    setStatus('読み込み完了', 'plan', true);
    planOk = true;
  } catch(e) { setStatus(e.message, 'plan', false); }

  btn.disabled = false; btn.textContent = '読み込む';

  if (posOk || planOk) {
    document.getElementById('refreshBtn').style.display = '';
    document.getElementById('inputCard').style.display = '';
    updateHeader();
    onDateChange();
  }
}

// ── CSVファイル読み込み（取引履歴） ───────────────
function loadPosFile(file) {
  if (!file) return;
  const reader = new FileReader();
  reader.onload = e => {
    try {
      parsePosCSV(e.target.result);
      setStatus(`${file.name} · ${posData.length.toLocaleString()} 明細行`, 'pos', true);
      document.getElementById('inputCard').style.display = '';
      updateHeader();
      onDateChange();
    } catch(err) { setStatus(err.message, 'pos', false); }
  };
  reader.readAsText(file, 'Shift-JIS');
}

function updateHeader() {
  document.getElementById('headerSub').textContent = 'POSデータから翌日の製造数を自動で按分します';
}

// ── 取引履歴CSVパース ─────────────────────────────
function parsePosCSV(text) {
  const lines = text.split('\n');
  const headers = splitCSV(lines[0]);
  const gi = n => headers.findIndex(h => h.trim()===n.trim());
  const iDate=gi('取引日時'), iStore=gi('店舗ID'), iProduct=gi('商品名'), iDept=gi('部門名'), iQty=gi('数量');
  const iCancel=headers.findIndex(h=>h.includes('取消区分'));
  if([iDate,iStore,iProduct,iDept,iQty].some(i=>i<0)) throw new Error('必要な列が見つかりません');
  posData=[];
  for(let i=1;i<lines.length;i++){
    const line=lines[i].trim(); if(!line) continue;
    const cols=splitCSV(line);
    if(iCancel>=0 && cols[iCancel]==='1') continue;
    const dept=(cols[iDept]||'').trim();
    if(EXCLUDE_DEPTS.some(d=>dept.includes(d))) continue;
    const qty=parseFloat(cols[iQty]); if(!qty||qty<=0) continue;
    const product=(cols[iProduct]||'').trim(); if(!product||product==='nan') continue;
    const dateStr=(cols[iDate]||'').trim().split(' ')[0];
    const storeId=parseInt(cols[iStore]); if(!storeId) continue;
    posData.push({date:dateStr, storeId, product, dept, qty});
  }
}

// ── 製造計画CSVパース ─────────────────────────────
function parsePlanCSV(text) {
  const lines = text.split('\n').map(l => splitCSV(l));
  // 日付行を探す（「1\n水」「2\n木」形式）
  let dateRowIdx = -1;
  let colToDay = {};
  for(let r=0; r<lines.length; r++){
    const row = lines[r];
    let found = 0;
    for(let c=0; c<row.length; c++){
      const v = (row[c]||'').replace(/\\n/g,'\n').trim();
      if(/^\d+[\n\s]/.test(v) || /^\d+$/.test(v)) found++;
    }
    if(found >= 5){ dateRowIdx = r; break; }
  }
  if(dateRowIdx < 0) throw new Error('製造計画の日付行が見つかりません');

  const dateRow = lines[dateRowIdx];
  for(let c=0; c<dateRow.length; c++){
    const v = (dateRow[c]||'').replace(/\\n/g,'\n').trim();
    const m = v.match(/^(\d+)/);
    if(m) colToDay[c] = parseInt(m[1]);
  }

  // 「製造振分数」セクションを探す
  const STORE_ROW_MAP = {'ソラリア':3,'赤坂':8,'香椎':5,'平尾':1,'平尾店':1,'ソラリア店':3,'香椎店':5,'赤坂店':8};
  planData = {};
  let inSection = false;
  for(let r=0; r<lines.length; r++){
    const row = lines[r];
    const cell0 = (row[0]||'').trim();
    const cell1 = (row[1]||'').trim();
    if(cell0.includes('製造振分数') || cell0.includes('製造振分')) inSection = true;
    if(inSection && (cell0.includes('販売') || cell0.includes('ロス'))) break;
    if(!inSection) continue;
    const sid = STORE_ROW_MAP[cell1];
    if(!sid) continue;
    if(!planData[sid]) planData[sid] = {};
    for(const [col, day] of Object.entries(colToDay)){
      const v = (row[parseInt(col)]||'').trim();
      if(v && v !== '' && !isNaN(v)) planData[sid][day] = parseInt(v);
    }
  }
}

// ── 日付変更時：製造計画から総製造数を表示 ────────
function onDateChange() {
  const dateStr = document.getElementById('targetDateInput').value;
  if(!dateStr) return;
  const day = parseInt(dateStr.split('-')[2]);
  const hasPlan = Object.keys(planData).length > 0;
  const preview = document.getElementById('totalPreview');
  const display = document.getElementById('totalDisplay');

  if(hasPlan){
    const totals = getTotalsForDay(day);
    const anyVal = AUTO_STORES.some(sid => totals[sid] > 0);
    if(anyVal){
      preview.style.display = '';
      display.innerHTML = AUTO_STORES.map(sid => {
        const v = totals[sid] || 0;
        return `<div class="store-input-cell${v===0?' manual':''}">
          <div class="s-name">${STORE_NAMES[sid]}</div>
          <div style="font-family:'SF Mono',monospace;font-size:1.1rem;font-weight:500;color:var(--ink);">${v||'—'}</div>
        </div>`;
      }).join('');
    } else {
      preview.style.display = '';
      display.innerHTML = `<span style="font-size:0.8rem;color:var(--ink-3);">この日の製造計画データがありません</span>`;
    }
  } else {
    preview.style.display = 'none';
  }
}

function getTotalsForDay(day) {
  const totals = {};
  for(const sid of AUTO_STORES){
    totals[sid] = planData[sid]?.[day] || 0;
  }
  return totals;
}

// ── ユーティリティ ────────────────────────────────
function splitCSV(line) {
  const r=[]; let c=''; let q=false;
  for(const ch of (line||'')){if(ch==='"'){q=!q;}else if(ch===','&&!q){r.push(c);c='';}else c+=ch;}
  r.push(c); return r;
}

function safeDow(dateStr) {
  const p = dateStr.replace(/\//g,'-').split('-').map(Number);
  return new Date(p[0], p[1]-1, p[2]).getDay();
}

function dateToStr(d) {
  // Date → "YYYY/MM/DD"
  return `${d.getFullYear()}/${String(d.getMonth()+1).padStart(2,'0')}/${String(d.getDate()).padStart(2,'0')}`;
}

function simpleAvg(values) {
  const valid = values.filter(v => v > 0);
  return valid.length === 0 ? 0 : valid.reduce((a,b)=>a+b,0) / valid.length;
}

// ── 計算 ──────────────────────────────────────────
function calculate() {
  const targetDateStr = document.getElementById('targetDateInput').value; // YYYY-MM-DD
  const targetDay = parseInt(targetDateStr.split('-')[2]);

  // 製造計画から総製造数取得
  const totals = getTotalsForDay(targetDay);

  // 直近28日の取引データを抽出
  const targetDate = new Date(targetDateStr);
  const cutoff = new Date(targetDate); cutoff.setDate(cutoff.getDate()-1); // 前日まで
  const oldest = new Date(cutoff); oldest.setDate(oldest.getDate()-(DAYS_BACK-1)); // 28日前
  const cutoffStr = dateToStr(cutoff);
  const oldestStr = dateToStr(oldest);

  const recentData = posData.filter(r => {
    const d = r.date.replace(/\//g,'-');
    const c = cutoffStr.replace(/\//g,'-');
    const o = oldestStr.replace(/\//g,'-');
    return d >= o && d <= c;
  });

  const actualDates = [...new Set(recentData.map(r=>r.date))].sort();

  // 店舗ごとに計算
  const calcResults = {};
  for(const sid of AUTO_STORES){
    calcResults[sid] = calcStore(sid, recentData, totals[sid] || 0);
  }

  renderTable(targetDateStr, calcResults, totals, actualDates);
}

function calcStore(storeId, recentData, totalQty) {
  const fixedProds = FIXED_BY_STORE[storeId] || [];
  const fixedSet = new Set(fixedProds);
  const sd = recentData.filter(r=>r.storeId===storeId);

  // 全商品の総販売数（直近28日）
  const grandTotal = sd.reduce((s,r)=>s+r.qty, 0);
  if(grandTotal === 0) return {allocations:{}, fixedProds, fixedTotal:0, dailyAllocated:totalQty, totalQty, noInput:totalQty===0};

  // 商品ごとの販売比率（単純比率）
  const productTotals = {};
  for(const r of sd){
    productTotals[r.product] = (productTotals[r.product]||0) + r.qty;
  }

  const noInput = totalQty === 0;
  const allocations = {};
  let fixedTotal = 0;
  for(const prod of fixedProds){
    const ratio = (productTotals[prod]||0) / grandTotal;
    const allocated = noInput ? 0 : Math.round(totalQty * ratio);
    allocations[prod] = {allocated, ratio};
    fixedTotal += allocated;
  }
  const dailyAllocated = noInput ? 0 : Math.max(0, totalQty - fixedTotal);
  return {allocations, fixedProds, fixedTotal, dailyAllocated, totalQty, noInput};
}

// ── テーブル描画 ──────────────────────────────────
function toggleGroup(btn) {
  const isOpen = btn.classList.contains('open');
  document.querySelectorAll('.mochitto-child').forEach(r => r.style.display = isOpen ? 'none' : '');
  btn.classList.toggle('open', !isOpen);
  btn.textContent = isOpen ? '+' : '×';
}

function renderTable(targetDateStr, calcResults, totals, actualDates) {
  const p = targetDateStr.split('-');
  const dow = DOW_JP[safeDow(targetDateStr.replace(/-/g,'/'))];
  document.getElementById('dateLine').textContent =
    `${parseInt(p[1])}月${parseInt(p[2])}日（${dow}曜日）  ·  直近${actualDates.length}日分の販売比率`;

  const warnArea = document.getElementById('warnArea');
  warnArea.innerHTML = actualDates.length < 14
    ? `<div class="warn-pill">⚠  参照データが${actualDates.length}日分のみです。28日分揃うと精度が上がります。</div>`
    : '';

  const colSpan = AUTO_STORES.length + 2;
  let html = '';
  html += `<thead><tr>`;
  html += `<th class="th-date">${parseInt(p[1])} / ${parseInt(p[2])}（${dow}）</th>`;
  for(const sid of AUTO_STORES) html += `<th class="th-store">${STORE_NAMES[sid]}</th>`;
  html += `<th class="th-total">合計</th>`;
  html += `</tr></thead><tbody>`;

  html += `<tr class="section-head"><td colspan="${colSpan}">固定商品</td></tr>`;
  const mochhittoSet = new Set(MOCHITTO_PLAIN_GROUP);
  let groupRendered = false;

  for(const prod of ALL_FIXED){
    if(!AUTO_STORES.some(sid=>(FIXED_BY_STORE[sid]||[]).includes(prod))) continue;

    if(mochhittoSet.has(prod)){
      if(!groupRendered){
        groupRendered = true;
        let parentTotal = 0;
        html += `<tr><td class="td-product group-parent">${MOCHITTO_PLAIN_LABEL}<span class="toggle-btn" onclick="toggleGroup(this)" style="margin-right:0;margin-left:0.45rem;">+</span></td>`;
        for(const sid of AUTO_STORES){
          const r = calcResults[sid];
          const hasGroup = MOCHITTO_PLAIN_GROUP.some(g=>(FIXED_BY_STORE[sid]||[]).includes(g));
          if(!hasGroup){ html += `<td class="td-num na">—</td>`; }
          else if(r.noInput){ html += `<td class="td-num zero">—</td>`; }
          else {
            const gv = MOCHITTO_PLAIN_GROUP.filter(g=>(FIXED_BY_STORE[sid]||[]).includes(g)).reduce((s,g)=>s+(r.allocations[g]?.allocated||0),0);
            parentTotal += gv; html += `<td class="td-num">${gv}</td>`;
          }
        }
        html += `<td class="td-total${parentTotal===0?' na':''}">${parentTotal||'—'}</td></tr>`;
      }
      let rowTotal = 0;
      const isLast = prod === MOCHITTO_PLAIN_GROUP[MOCHITTO_PLAIN_GROUP.length-1];
      html += `<tr class="child-row mochitto-child" style="display:none;">`;
      html += `<td class="td-product">${isLast?'└':'├'} ${prod}</td>`;
      for(const sid of AUTO_STORES){
        const r = calcResults[sid];
        if(!(FIXED_BY_STORE[sid]||[]).includes(prod)){ html += `<td class="td-num na"></td>`; }
        else if(r.noInput){ html += `<td class="td-num zero">—</td>`; }
        else { const val=r.allocations[prod]?.allocated||0; rowTotal+=val; html+=`<td class="td-num">${val||'—'}</td>`; }
      }
      html += `<td class="td-total${rowTotal===0?' na':''}">${rowTotal||'—'}</td></tr>`;
      continue;
    }

    let rowTotal = 0;
    html += `<tr><td class="td-product">${prod}</td>`;
    for(const sid of AUTO_STORES){
      const r = calcResults[sid];
      if(!(FIXED_BY_STORE[sid]||[]).includes(prod)){ html += `<td class="td-num na">—</td>`; }
      else if(r.noInput){ html += `<td class="td-num zero">—</td>`; }
      else { const val=r.allocations[prod]?.allocated||0; rowTotal+=val; html+=`<td class="td-num">${val}</td>`; }
    }
    html += `<td class="td-total${rowTotal===0?' na':''}">${rowTotal||'—'}</td></tr>`;
  }

  // 固定計
  html += `<tr class="subtotal-row"><td class="td-product">固定　計</td>`;
  let fixedGrand = 0;
  for(const sid of AUTO_STORES){
    const r=calcResults[sid]; const v=r.noInput?0:r.fixedTotal; fixedGrand+=v;
    html+=`<td class="td-num">${r.noInput?'—':v}</td>`;
  }
  html += `<td class="td-total">${fixedGrand||'—'}</td></tr>`;

  // 日替わり
  html += `<tr class="section-head"><td colspan="${colSpan}">日替わり</td></tr>`;
  html += `<tr><td class="td-product daily">日替わり 枠</td>`;
  let dailyGrand = 0;
  for(const sid of AUTO_STORES){
    const r=calcResults[sid]; const v=r.noInput?0:r.dailyAllocated; dailyGrand+=v;
    html+=`<td class="td-num${r.noInput?' zero':''}">${r.noInput?'—':v}</td>`;
  }
  html += `<td class="td-total">${dailyGrand||'—'}</td></tr>`;

  // 総製造数
  html += `<tr class="grand-row"><td class="td-product">総製造数</td>`;
  let grandGrand = 0;
  for(const sid of AUTO_STORES){
    const r=calcResults[sid]; grandGrand+=r.totalQty;
    html+=`<td class="td-num">${r.totalQty||'—'}</td>`;
  }
  html += `<td class="td-total">${grandGrand||'—'}</td></tr>`;
  html += `</tbody>`;

  document.getElementById('wbTable').innerHTML = html;
  document.getElementById('calcNote').textContent =
    `直近${actualDates.length}日間の販売比率で按分（固定 = 定番商品、日替わり = 総製造数 − 固定合計）`;

  document.getElementById('results').style.display = 'block';
  document.getElementById('results').scrollIntoView({behavior:'smooth'});
}
</script>
